<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Digest</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --ink:#0f0e0d;
  --ink-muted:#5a5750;
  --ink-faint:#c2bfb8;
  --paper:#f5f2eb;
  --paper-warm:#ede9df;
  --paper-card:#faf8f4;
  --accent:#c0392b;
  --rule:#d4cfc5;
  --col-w:760px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
}

/* =========================================
   HEADER
========================================= */

.masthead{
  text-align:center;
  padding:2rem 0 1.3rem;
  border-bottom:3px double var(--ink);
  position:sticky;
  top:0;
  background:var(--paper);
  z-index:100;
}

.masthead-eyebrow{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.25em;
  color:var(--ink-muted);
  margin-bottom:0.5rem;
}

.masthead h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,6vw,4rem);
  line-height:1;
  font-weight:900;
}

.masthead-sub{
  display:inline-block;
  margin-top:0.6rem;
  padding-top:0.4rem;
  border-top:1px solid var(--ink-faint);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ink-muted);
}

/* =========================================
   SEARCH
========================================= */

.search-area{
  max-width:var(--col-w);
  margin:auto;
  padding:1.7rem 1.4rem 0;
}

.search-row{
  display:flex;
  overflow:hidden;
  border:1.5px solid var(--ink);
  background:var(--paper-card);
}

.search-row input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  padding:0.85rem 1rem;
  font-size:1rem;
}

.count-select{
  border:none;
  border-left:1px solid var(--ink);
  border-right:1px solid var(--ink);
  background:var(--paper-warm);
  padding:0 1rem;
}

.fetch-btn{
  border:none;
  background:var(--ink);
  color:var(--paper);
  padding:0 1.5rem;
  cursor:pointer;
  text-transform:uppercase;
  font-size:0.8rem;
  letter-spacing:0.08em;
}

.fetch-btn:hover{
  background:var(--accent);
}

/* =========================================
   STATUS
========================================= */

.status-bar{
  max-width:var(--col-w);
  margin:1rem auto 0;
  padding:0 1.4rem;
  display:flex;
  align-items:center;
  gap:0.5rem;
  color:var(--ink-muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--ink-faint);
}

.dot.green{
  background:#27ae60;
}

.dot.red{
  background:#c0392b;
}

.dot.pulse{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  50%{
    opacity:0.3;
  }
}

/* =========================================
   CONTENT
========================================= */

.content{
  max-width:var(--col-w);
  margin:auto;
  padding:2rem 1.4rem 4rem;
}

/* =========================================
   TOPIC HEADER
========================================= */

.topic-header{
  display:flex;
  align-items:baseline;
  gap:1rem;
  border-top:3px solid var(--ink);
  border-bottom:1px solid var(--ink);
  padding:0.7rem 0;
  margin-bottom:2rem;
}

.topic-label{
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
  text-transform:capitalize;
}

.topic-meta{
  margin-left:auto;
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--ink-muted);
}

/* =========================================
   ARTICLE
========================================= */

.article{
  border-bottom:1px solid var(--rule);
  padding:1.5rem 0;
}

.article-number{
  font-size:10px;
  letter-spacing:0.2em;
  color:var(--accent);
  text-transform:uppercase;
}

.article-title{
  display:block;
  margin:0.5rem 0;
  color:var(--ink);
  text-decoration:none;
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  line-height:1.35;
  font-weight:700;
}

.article-title:hover{
  color:var(--accent);
}

.article-meta{
  display:flex;
  gap:1rem;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink-muted);
}

.article-source{
  color:var(--ink);
  font-weight:500;
}

.article-summary{
  margin-top:1rem;
  background:var(--paper-warm);
  border-left:3px solid var(--accent);
  padding:0.8rem 1rem;
  line-height:1.7;
}

.article-link{
  display:inline-block;
  margin-top:0.8rem;
  color:var(--ink-muted);
  text-decoration:none;
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:0.08em;
}

.article-link:hover{
  color:var(--accent);
}

/* =========================================
   EMPTY
========================================= */

.empty-state{
  text-align:center;
  padding:5rem 2rem;
  color:var(--ink-muted);
}

.empty-state .big{
  font-size:3rem;
  opacity:0.2;
  margin-bottom:1rem;
}

/* =========================================
   ERROR
========================================= */

.error-msg{
  background:#fdf0f0;
  border-left:3px solid var(--accent);
  padding:1rem;
  color:var(--accent);
}

</style>
</head>

<body>

<header class="masthead">
  <p class="masthead-eyebrow">
    Powered by Gemini AI · NewsAPI
  </p>

  <h1>THE DIGEST</h1>

  <span class="masthead-sub">
    AI-Summarized News
  </span>
</header>

<div class="search-area">

  <div class="search-row">

    <input
      type="text"
      id="topicInput"
      placeholder="technology, finance, AI..."
      value="technology"
    >

    <select class="count-select" id="countSelect">
      <option value="3">3</option>
      <option value="5" selected>5</option>
      <option value="8">8</option>
      <option value="10">10</option>
    </select>

    <button class="fetch-btn" onclick="runDigest()">
      Fetch →
    </button>

  </div>
</div>

<div class="status-bar">

  <span class="dot" id="statusDot"></span>

  <span id="statusText">
    Enter a topic and press Fetch
  </span>

</div>

<main class="content" id="content">

  <div class="empty-state">
    <div class="big">✦</div>
    <p>Your digest will appear here</p>
  </div>

</main>

<script>

const API = '';

/* =========================================
   STATUS
========================================= */

function setStatus(msg,state='idle'){

  document.getElementById('statusText').textContent = msg;

  const dot = document.getElementById('statusDot');

  dot.className = 'dot';

  if(state === 'ok'){
    dot.classList.add('green');
  }

  if(state === 'err'){
    dot.classList.add('red');
  }

  if(state === 'loading'){
    dot.classList.add('pulse');
  }
}

/* =========================================
   DATE
========================================= */

function formatDate(iso){

  if(!iso) return '';

  return new Date(iso).toLocaleDateString(
    'en-US',
    {
      month:'short',
      day:'numeric',
      year:'numeric'
    }
  );
}

/* =========================================
   GEMINI SUMMARY
========================================= */

async function streamSummary(
  summaryEl,
  title,
  description
){

  try{

    const params = new URLSearchParams({
      title,
      description
    });

    const res = await fetch(
      `${API}/api/summarize?${params}`
    );

    const data = await res.json();

    if(data.error){

      summaryEl.textContent = data.error;
      return;
    }

    summaryEl.textContent = data.summary;

  }catch(err){

    summaryEl.textContent =
      'Could not summarize article.';
  }
}

/* =========================================
   MAIN
========================================= */

async function runDigest(){

  const topic =
    document.getElementById('topicInput')
    .value.trim() || 'technology';

  const count =
    parseInt(
      document.getElementById('countSelect').value
    );

  const content =
    document.getElementById('content');

  setStatus(
    'Fetching latest news...',
    'loading'
  );

  content.innerHTML = '';

  try{

    const res = await fetch(
      `${API}/api/news?topic=${encodeURIComponent(topic)}&count=${count}`
    );

    const data = await res.json();

    if(data.error){

      content.innerHTML = `
        <div class="error-msg">
          ${data.error}
        </div>
      `;

      setStatus(data.error,'err');

      return;
    }

    const articles = data.articles;

    if(!articles.length){

      content.innerHTML = `
        <div class="empty-state">
          <div class="big">∅</div>
          <p>No articles found</p>
        </div>
      `;

      setStatus('No results','err');

      return;
    }

    const now =
      new Date().toLocaleDateString(
        'en-US',
        {
          weekday:'long',
          month:'long',
          day:'numeric',
          year:'numeric'
        }
      );

    content.innerHTML = `

      <div class="topic-header">

        <span class="topic-label">
          ${topic}
        </span>

        <span class="topic-meta">
          ${now} · ${articles.length} articles
        </span>

      </div>

      ${articles.map((a,i)=>`

        <article class="article">

          <span class="article-number">
            No. ${String(i+1).padStart(2,'0')}
          </span>

          <a
            class="article-title"
            href="${a.url}"
            target="_blank"
          >
            ${a.title}
          </a>

          <div class="article-meta">

            <span class="article-source">
              ${a.source}
            </span>

            <span>
              ${formatDate(a.publishedAt)}
            </span>

          </div>

          <div
            class="article-summary"
            id="sum-${i}"
          >
            Summarizing...
          </div>

          <a
            class="article-link"
            href="${a.url}"
            target="_blank"
          >
            Read full article →
          </a>

        </article>

      `).join('')}
    `;

    setStatus(
      `Summarizing ${articles.length} articles with Gemini AI...`,
      'loading'
    );

    for(let i=0;i<articles.length;i++){

      const a = articles[i];

      const el =
        document.getElementById(`sum-${i}`);

      await streamSummary(
        el,
        a.title,
        a.description
      );
    }

    setStatus(
      'Done · summaries generated',
      'ok'
    );

  }catch(err){

    content.innerHTML = `
      <div class="error-msg">
        Could not connect to FastAPI server.
      </div>
    `;

    setStatus(
      'Server unreachable',
      'err'
    );
  }
}

/* =========================================
   HEALTH CHECK
========================================= */

(async()=>{

  try{

    const res = await fetch(
      `${API}/api/health`
    );

    const data = await res.json();

    if(data.gemini_api === 'ok'){

      setStatus(
        'Gemini AI connected · ready',
        'ok'
      );

    }else{

      setStatus(
        'Gemini API unavailable',
        'err'
      );
    }

  }catch{

    setStatus(
      'Server unreachable',
      'err'
    );
  }

})();

/* =========================================
   ENTER KEY
========================================= */

document
.getElementById('topicInput')
.addEventListener('keydown',e=>{

  if(e.key === 'Enter'){
    runDigest();
  }

});

</script>

</body>
</html>
